name: Build ARM Binary

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    name: Build ARMv7
    runs-on: ubuntu-24.04-arm
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
        id: setup-buildx

      - name: Restore Nuitka build cache
        uses: actions/cache@v4
        id: cache-nuitka
        with:
          path: cache-nuitka
          key: nuitka-cache-${{ runner.arch }}
          restore-keys: nuitka-cache-

      - name: Inject buildkit cache
        uses: reproducible-containers/buildkit-cache-dance@v3
        with:
          builder: ${{ steps.setup-buildx.outputs.name }}
          cache-dir: cache-nuitka
          dockerfile: .github/Dockerfile.arm
          skip-extraction: ${{ steps.cache-nuitka.outputs.cache-hit }}

      - name: Write build SHA
        run: git rev-parse --short HEAD > kindle_hid_passthrough/BUILD_SHA

      - name: Build ARMv7 binary with Docker
        uses: docker/build-push-action@v6
        with:
          context: .
          file: .github/Dockerfile.arm
          platforms: linux/arm/v7
          tags: kindle-hid-passthrough-builder
          load: true
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Extract binaries
        run: |
          CONTAINER_ID=$(docker create kindle-hid-passthrough-builder)
          mkdir -p output/dist

          # Extract C wrapper and syscall shim
          docker cp "$CONTAINER_ID:/build/kindle-hid-passthrough" ./output/kindle-hid-passthrough
          docker cp "$CONTAINER_ID:/build/libsyscall_wrapper.so" ./output/libsyscall_wrapper.so

          # Extract entire Nuitka standalone dist directory (includes ld-linux + all .so deps)
          docker cp "$CONTAINER_ID:/build/nuitka-out/main.dist/." ./output/dist/

          docker rm "$CONTAINER_ID"
          chmod +x output/kindle-hid-passthrough output/dist/main.bin output/dist/ld-linux-armhf.so.3

      - name: Add scripts and assets
        run: |
          cp -r scripts/ output/
          cp -r assets/ output/
          cp -r illusion/ output/
          cp kindle_hid_passthrough/config.ini output/
          # Copy so both assets/ and scripts/ paths resolve dev_is_keyboard.sh
          # (FAT32 on /mnt/us/ doesn't support symlinks)
          cp scripts/dev_is_keyboard.sh output/assets/dev_is_keyboard.sh

      - name: Show contents
        run: |
          echo "=== Top level ==="
          ls -lh output/
          echo "=== dist/ ==="
          ls -lh output/dist/ | head -30
          echo "=== File types ==="
          file output/kindle-hid-passthrough output/dist/main.bin output/dist/ld-linux-armhf.so.3

      - name: Create tarball
        run: |
          tar -czvf "kindle-hid-passthrough-armv7.tar.gz" -C output .
          ls -lh *.tar.gz

      - name: Validate KindleForge install compatibility
        run: |
          echo "Checking tarball contains all files expected by KindleForge install.sh..."
          MISSING=0
          for f in \
            kindle-hid-passthrough \
            assets/hid-passthrough.upstart \
            assets/dev_is_keyboard.sh \
            assets/99-hid-keyboard.rules \
            scripts/dev_is_keyboard.sh \
            illusion/BTManager.sh \
            config.ini \
            dist/main.bin; do
            if ! tar -tzf kindle-hid-passthrough-armv7.tar.gz "./$f" >/dev/null 2>&1; then
              echo "MISSING: $f"
              MISSING=1
            else
              echo "OK: $f"
            fi
          done
          if [ "$MISSING" -eq 1 ]; then
            echo "::error::Tarball is missing files required by KindleForge install script"
            exit 1
          fi
          echo "All required files present."

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: kindle-hid-passthrough-armv7
          path: |
            output/
            *.tar.gz

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: kindle-hid-passthrough-armv7.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
